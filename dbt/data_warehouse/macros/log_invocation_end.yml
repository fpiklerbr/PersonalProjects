version: 2

macros:
  - name: log_invocation_end
    description: |
      This macro updates the `meta_dbt.log_invocations` table at the end of every dbt invocation, triggered by an
      `on-run-end` operation. It writes the database's native `current_timestamp` function into the `started_at` column
      for the row whose `dbt_invocation_id` matches dbt's internal `invocation_id` function.
    docs:
      show: true
    arguments: []
