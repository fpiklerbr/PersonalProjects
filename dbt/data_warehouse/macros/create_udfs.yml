version: 2

macros:
  - name: create_udfs
    description: |
      This macro runs as part of the on-run-start hook for every dbt invocation, setting up the target database to
      support dbt models & macros. It runs differently on PostgreSQL & BigQuery, with the goal of creating functional
      parity between the two environments.
      On PG, it runs a CREATE SCHEMA statement to make sure that the target schema exists, GRANTs permissions on that
      schema to the root user, and then calls the create_f_get_stat_activity() macro to create a UDF that exposes
      internal PG stats (which normally requires high privileges) to the dbt user.
      On BQ, it calls the create_f_json_object_keys_array() and create_f_json_dict_to_list() macros to create UDFs
      (both defined in Javascript) that provide JSON-parsing features not native to BQ.
    arguments: []
