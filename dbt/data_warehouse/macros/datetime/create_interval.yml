version: 2

macros:
  - name: create_interval
    description: |
      Macro to build a value of `interval` type from two arguments,
      representing the specified quantity (`count`) of the specified datetime unit (`period`)
    arguments:
      - name: count
        type: integer
        description: |
          String literal or SQL expression evaluating to the quantity of `period` units
          in the desired interval. NULL results in a NULL interval
      - name: period
        type: datetime unit
        description: |
          String literal or SQL expression evaluating to one of the following:
          'year', 'month', 'day', 'hour', 'minute', 'second'.
          Any other value results in a NULL interval
