version: 2

macros:
  - name: log_invocation_start
    description: |
      This macro inserts a row into the `meta_dbt.log_invocations` table at the start of every dbt invocation, triggered
      by an `on-run-start` operation. It writes dbt's internal `invocation_id` function into the log table's
      `dbt_invocation_id` column; the `name`, `user`, and `threads` of dbt's internal `target` function into the
      `target_name`, `target_user`, and `target_threads` columns; the `invoking_job_name` and `invoking_job_id` variables
      (passed in from the command line) into the `invoking_job_name` and `invoking_job_id` columns; and the database's
      native `current_timestamp` function into the `started_at` column.
    docs:
      show: true
    arguments: []
