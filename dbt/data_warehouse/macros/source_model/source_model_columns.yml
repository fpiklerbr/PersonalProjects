version: 2

macros:
  - name: source_model_columns
    description: |
      This macro generates a dictionary of columns in a source table, calling `source_table_docs()` to get
      all documented columns and `adapter.get_columns_in_relation()` to get any additional undocumented columns
      present in the database. Each column is represented by a nested dictionary with these keys:
      - `name`: exposed for reference
      - `refinement_layer`: used by `source_model_layers()`
      - `is_hidden`: used by `source_model_layer_sql()` in the final layer 
      - `is_hashed`: used by `source_model_layer_sql()` in the final layer
      - `expression`: generated by `source_model_column_expression()`; used by `source_model_layer_sql()` and `ether_inventory_unit_attribute_history()`
      - `alias`: used by `source_model_layer_sql()` and `ether_inventory_unit_attribute_history()`
      - `documented_properties`: exposed for reference
    docs:
      show: true
    arguments:
      - name: source_name
        type: dbt identifier
        description: Required. The name of a dbt-documented source. Same as the first argument of the standard dbt `source()` macro.
      - name: source_table
        type: dbt identifier
        description: Required. The name of a table for that dbt-documented source. Same as the second argument of the standard dbt `source()` macro.
