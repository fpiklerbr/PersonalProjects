version: 2

macros:
  - name: 'create_f_json_dict_to_list'
    description: |
      this udfs will take a traditional key-value pair json as input
      (like: '{"class":"dbt","operator":"run"}')
      , and then returns a list-like json containing several dict
      (like: '\[{"key":"class","value":"dbt"},{"key":"operator","value":"run"}\]')
    docs:
      show: true
    arguments: []
