version: 2

macros:
  - name: 'create_f_json_object_keys_array'
    description: |
      Creates a UDF (via JavaScript) named json_object_keys_array() that extracts the attribute names from the outermost
      layer of a json object and returns them as an array. The macro is called only on BigQuery by the create_udfs()
      macro via an on-run-start hook, and the resulting UDF is used by the json_object_keys() macro.
      The macro takes no arguments itself, but the resulting UDF takes an argument named `json_row` and works like this:
      input: '{"key_1": "value_1", "key_2": "value_2"}'
      output: '["key_1", "key_2"]'
    docs:
      show: true
    arguments: []
