version: 2

macros:
  - name: json_object_keys
    description: |
      This macro extracts the attribute names from the outermost layer of a json object and returns them as a result set.
      On PostgreSQL, it simply calls the native json_object_keys() function
      On BigQuery, it calls the json_object_keys_array() UDF, which is defined by the create_f_json_object_keys_array()
      macro, and then unnests the result
    arguments:
      - name: json_row
        type: json
        description: "A sql expression evaluating to a json object, the keys of which you don't know but want to use as rows"
