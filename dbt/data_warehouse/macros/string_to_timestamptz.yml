version: 2

macros:
  - name: string_to_timestamptz
    description: |
      This macro safely parses a `timestamp_string` representating datetime values as a [strftime-like](https://strftime.org/)
      `format_string` and casts them to the desired `output_type`. It uses the `to_timestamp` function in PG and the
      `parse_timestamp` function in BQ, but first compares `timestamp_string` to `format_string` via regex and only
      attempts to parse strings matching the expected format (returning NULL in cases where the string is not in the
      expected format, which may otherwise throw errors in PG and/or BQ)
    docs:
      show: true
    arguments:
      - name: timestamp_string
        type: column_name
        description: "Column (or other SQL expression) that stores the string representation to be parsed into a datetime"
      - name: format_string
        type: string_literal
        description: |
          The [strftime format](https://strftime.org/) in which `timestamp_string` encodes the values. In the usual case
          where this is a constant, quotes should be included as part of the argument.
      - name: output_type
        type: data_type
        description: |
          Optional, defaults to 'timestamptz'. Data type to which the values encoded by `timestamp_string` should be cast
